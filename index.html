<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubber Price Report - F16L & F17L</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --border-color: #000; --primary-green: #2e7d32; }
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 10px;
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            justify-content: center; 
        }

        @media (max-width: 1100px) {
            body { flex-direction: column; align-items: center; }
            .form-panel, .preview-panel { width: 100% !important; max-width: 600px; }
            .preview-panel { overflow-x: auto; padding: 15px !important; }
            #report-area { width: 580px !important; }
        }

        .form-panel { 
            width: 420px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            height: fit-content;
        }
        
        .form-panel h3 { margin: 0 0 15px 0; border-bottom: 2px solid var(--primary-green); padding-bottom: 5px; color: var(--primary-green); }
        .input-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
        .input-row label { flex: 1; font-size: 14px; font-weight: bold; color: #444; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .p-input { width: 80px; text-align: center; }
        .section-box { background: #fdfdfd; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-top: 15px; }
        .section-box strong { display: block; margin-bottom: 8px; color: #333; font-size: 15px; }
        .full-input { width: 100%; margin-bottom: 8px; }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary-green); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px; 
            font-size: 16px; 
        }

        .preview-panel { 
            background: white; 
            padding: 35px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            align-self: flex-start; 
        }
        
        #report-area { width: 600px; background: white; padding: 5px; }
        .date-text { font-weight: bold; font-size: 16px; margin-bottom: 10px; font-family: Arial, sans-serif; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid var(--border-color); }
        th, td { border: 1px solid var(--border-color); padding: 8px; font-size: 14px; font-family: Arial, sans-serif; vertical-align: middle; }
        
        .col-factory { width: 40%; }
        .col-price { width: 30%; }
        .center { text-align: center; }
        .bold { font-weight: bold; }
        
        .footer-label { text-align: center; line-height: 1.4; }
        .qty-line { font-weight: bold; text-decoration: underline; font-size: 15px; }
        .note-line { font-size: 12px; margin-top: 4px; display: block; }
        .price-large { font-size: 17px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="form-panel">
    <h3>Data Entry</h3>
    
    <div class="input-row">
        <label>Report Date:</label>
        <input type="date" id="in_date" class="full-input" oninput="update()">
    </div>

    <div id="factory-fields"></div>

    <div class="section-box">
        <strong>F16L Details</strong>
        <input id="f16l_qty" class="full-input" placeholder="Quantity (e.g., 50 tons)" oninput="update()">
        <input id="f16l_note" class="full-input" placeholder="Note" oninput="update()">
        <div class="input-row">
            <input id="f16l_p1" class="p-input" placeholder="Price 1" oninput="update()">
            <input id="f16l_p2" style="flex:1" placeholder="Price Range" oninput="update()">
        </div>
    </div>

    <div class="section-box">
        <strong>F17L Details</strong>
        <input id="f17l_qty" class="full-input" placeholder="Quantity (e.g., 170 tons)" oninput="update()">
        <input id="f17l_note" class="full-input" placeholder="Note" oninput="update()">
        <div class="input-row">
            <input id="f17l_p1" class="p-input" placeholder="Price 1" oninput="update()">
            <input id="f17l_p2" style="flex:1" placeholder="Price Range" oninput="update()">
        </div>
    </div>

    <button onclick="download()">Download Report (PNG)</button>
</div>

<div class="preview-panel">
    <div id="report-area">
        <div class="date-text" id="v_date">Date: -</div>
        <table>
            <thead>
                <tr>
                    <th rowspan="2" class="col-factory">Factory</th>
                    <th colspan="2" class="center">Price, THB</th>
                </tr>
                <tr>
                    <th class="col-price center">1st</th>
                    <th class="col-price center">2nd</th>
                </tr>
            </thead>
            <tbody id="v_body"></tbody>
            <tbody id="v_footer"></tbody>
        </table>
    </div>
</div>

<script>
    const factories = [
        "Tavorn", "Southland Rubber", "Tatwin", "Ehup", 
        "Feltex", "Thai Rubber", "Chaiyaporn", "Chalong", 
        "Sritrang/Rubber Land", "Guanken Trang", "RAOT"
    ];

    const fieldContainer = document.getElementById('factory-fields');
    factories.forEach((name, i) => {
        fieldContainer.innerHTML += `
            <div class="input-row">
                <label>${name}</label>
                <input id="p1_${i}" class="p-input" placeholder="P1" oninput="update()">
                <input id="p2_${i}" class="p-input" placeholder="P2" oninput="update()">
            </div>`;
    });

    function update() {
        const dateInput = document.getElementById('in_date').value;
        let formattedDate = "-";
        if(dateInput) {
            const dateObj = new Date(dateInput);
            formattedDate = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }
        document.getElementById('v_date').innerText = "Date: " + formattedDate;

        let html = '';
        factories.forEach((name, i) => {
            const v1 = document.getElementById(`p1_${i}`).value.trim();
            const v2 = document.getElementById(`p2_${i}`).value.trim();

            html += `<tr><td>${name}</td>`;
            if (v2 === "" || v1 === v2) {
                html += `<td colspan="2" class="center">${v1 || "-"}</td>`;
            } else {
                html += `<td class="center">${v1}</td><td class="center">${v2}</td>`;
            }
            html += `</tr>`;
        });
        document.getElementById('v_body').innerHTML = html;

        let footerHtml = '';
        ['f16l', 'f17l'].forEach(id => {
            const q = document.getElementById(id+'_qty').value || "-";
            const n = document.getElementById(id+'_note').value || "-";
            const p1 = document.getElementById(id+'_p1').value || "-";
            const p2 = document.getElementById(id+'_p2').value || "-";

            footerHtml += `
                <tr>
                    <td class="footer-label">
                        <span class="bold">${id.toUpperCase()}</span><br>Today estimate qty.<br>
                        <span class="qty-line">${q}</span>
                        <span class="note-line">Note: ${n}</span>
                    </td>
                    <td class="price-large">${p1}</td>
                    <td class="price-large">${p2}</td>
                </tr>`;
        });
        document.getElementById('v_footer').innerHTML = footerHtml;
    }

    function download() {
        const area = document.getElementById("report-area");
        window.scrollTo(0,0); 
        html2canvas(area, { scale: 3, useCORS: true, allowTaint: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Rubber_Price_Report.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    update();
</script>

</body>
</html>
